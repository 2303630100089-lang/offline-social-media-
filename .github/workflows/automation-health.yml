name: Automation Health

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  phase-and-errors:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: MeshVerse
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compute full Phase 1 and Phase 2
        run: |
          python3 build-scripts/compute-phase-progress.py \
            --readme ../README.md \
            --output build/reports/ci/phase-progress.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.4

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build debug APK
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew --no-daemon :app:assembleDebug
          else
            gradle --no-daemon :app:assembleDebug
          fi

      - name: Upload automation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-health-reports
          path: MeshVerse/build/reports/ci/**
          if-no-files-found: warn
