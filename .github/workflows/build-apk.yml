name: Build APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: MeshVerse

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.4

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build debug APK
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew --no-daemon :app:assembleDebug
          else
            gradle --no-daemon :app:assembleDebug
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: meshverse-debug-apk
          path: MeshVerse/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Create GitHub Release with APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-${{ github.run_attempt }}
          name: "MeshVerse Debug Build #${{ github.run_number }}"
          body: |
            Automated debug build from commit ${{ github.sha }}.
          files: MeshVerse/app/build/outputs/apk/debug/*.apk
          prerelease: true
